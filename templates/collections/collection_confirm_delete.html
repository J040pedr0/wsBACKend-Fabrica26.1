{% extends 'base.html' %}
{% block title %}Excluir Coleção{% endblock %}
{% block content %}
<h2>Excluir Coleção</h2>
<p>Tem certeza que deseja excluir a coleção "{{ collection.name }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Sim, excluir</button>
    <a href="{% url 'collection_detail' collection.id %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
