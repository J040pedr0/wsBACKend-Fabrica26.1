{% extends 'base.html' %}
{% block title %}Home{% endblock %}
{% block content %}
<div class="text-center">
    <h1>Bem-vindo ao Colecionador Rick and Morty</h1>
    <p>Gerencie suas coleções de personagens favoritos!</p>
    {% if not user.is_authenticated %}
    <a href="{% url 'login' %}" class="btn btn-primary">Entrar</a>
    <a href="{% url 'register' %}" class="btn btn-secondary">Registrar</a>
    {% endif %}
</div>
{% endblock %}
