{% extends 'base.html' %}
{% block title %}Entrar{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>Entrar</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Entrar</button>
        </form>
        <p class="mt-3">Não tem conta? <a href="{% url 'register' %}">Registre-se</a></p>
    </div>
</div>
{% endblock %}
